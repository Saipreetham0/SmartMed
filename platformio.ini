; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; ---------------------------------------------------------------------------
; Firmware + on-hardware (sensor/connection) tests.
; Build/upload:   pio run -e esp32doit-devkit-v1 -t upload
; Run HW tests:   pio test -e esp32doit-devkit-v1
;   (board must be connected; tests RTC, LCD, reed switches, LEDs, buzzer)
; ---------------------------------------------------------------------------
[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
test_filter = test_hardware
lib_deps =
	adafruit/RTClib@^2.1.4
	marcoschwartz/LiquidCrystal_I2C@^1.1.4
	bblanchon/ArduinoJson@^7.0.4

; ---------------------------------------------------------------------------
; LCD contrast-tuning helper (builds tools/lcd_tune.cpp instead of the firmware).
; Upload:  pio run -e lcd_tune -t upload
; ---------------------------------------------------------------------------
[env:lcd_tune]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<../tools/lcd_tune.cpp>
lib_deps =
	marcoschwartz/LiquidCrystal_I2C@^1.1.4

; ---------------------------------------------------------------------------
; RTC live check (builds tools/rtc_check.cpp). Shows time on LCD + Serial.
; Upload:  pio run -e rtc_check -t upload
; ---------------------------------------------------------------------------
[env:rtc_check]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<../tools/rtc_check.cpp>
lib_deps =
	adafruit/RTClib@^2.1.4
	marcoschwartz/LiquidCrystal_I2C@^1.1.4

; ---------------------------------------------------------------------------
; Reed/LED mapper (builds tools/reed_map.cpp). Open a box -> see which pin.
; Upload:  pio run -e reed_map -t upload
; ---------------------------------------------------------------------------
[env:reed_map]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<../tools/reed_map.cpp>
lib_deps =
	marcoschwartz/LiquidCrystal_I2C@^1.1.4

; ---------------------------------------------------------------------------
; LED mapper (builds tools/led_map.cpp). Lights one LED at a time.
; Upload:  pio run -e led_map -t upload
; ---------------------------------------------------------------------------
[env:led_map]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<../tools/led_map.cpp>
lib_deps =
	marcoschwartz/LiquidCrystal_I2C@^1.1.4

; ---------------------------------------------------------------------------
; Box alignment verifier (builds tools/verify_boxes.cpp). Open box -> its LED.
; Upload:  pio run -e verify_boxes -t upload
; ---------------------------------------------------------------------------
[env:verify_boxes]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<../tools/verify_boxes.cpp>
lib_deps =
	marcoschwartz/LiquidCrystal_I2C@^1.1.4

; ---------------------------------------------------------------------------
; Fast host-side logic tests (no board needed).
; Run:  pio test -e native
; ---------------------------------------------------------------------------
[env:native]
platform = native
test_filter = test_logic
